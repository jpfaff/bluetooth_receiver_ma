configuration:
  bluetooth_name:
    name: Bluetooth Name
    description: Visible Bluetooth speaker name

  stream_mode:
    name: Stream Mode
    description: http = expose stream URL, push = send directly

  stream_url:
    name: Push Stream URL
    description: Music Assistant ingest URL

  http_port:
    name: HTTP Port
    description: Port for stream.mp3

  bitrate:
    name: MP3 Bitrate
    description: Streaming quality
