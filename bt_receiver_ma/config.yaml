name: Bluetooth Receiver for Music Assistant
slug: bt_receiver_ma
description: Receive Bluetooth audio and bridge to Music Assistant
version: "1.0.0"
url: https://github.com/YOUR_GITHUB/bluetooth_receiver_ma
startup: services
boot: auto
init: false
host_network: true
homeassistant_api: true
host_dbus: true
host_network: true
privileged:
  - NET_ADMIN
  - SYS_ADMIN
devices:
  - /dev
map:
  - config:rw
options:
  bluetooth_name: "HA Bluetooth Speaker"
  stream_mode: "http"
  stream_url: ""
  http_port: 8099
schema:
  bluetooth_name: str
  stream_mode: list(http|push)
  stream_url: str?
  http_port: port
arch:
  - amd64
  - aarch64
  - armv7

